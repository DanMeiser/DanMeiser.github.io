<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Space Game</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameWrapper">

    <!-- Game Canvas (behind all screens) -->
    <canvas id="gameCanvas"></canvas>

    <!-- Character Select Menu -->
    <div id="menu" class="screen">
      <div class="menu-content">
        <h1>Space Station</h1>
        <p class="subtitle">Manage your crew, survive the cosmos</p>
        <div class="menu-characters">
          <button class="menu-character-btn" data-char="astronaut">
            <span style="font-size:3rem;display:block;margin-bottom:8px">🚀</span>
            <span>Launch</span>
          </button>
        </div>
        <div class="menu-info">
          <p>Walk between rooms · Press E to interact</p>
          <p>Keep O₂, Power, Food &amp; Hull alive!</p>
        </div>
      </div>
    </div>

    <!-- HUD (shown during gameplay) -->
    <div id="hud" class="hidden">
      <span class="pill" id="scoreDisplay">Score: 0</span>
      <span class="pill" id="levelDisplay">Level: 1</span>
      <span class="pill" id="livesDisplay">Lives: 3</span>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOver" class="screen hidden">
      <div class="game-over-content">
        <h2>Game Over!</h2>
        <p id="lossReason" style="font-size:1.2em;color:#e74c3c;font-weight:bold;margin-bottom:0.3em;"></p>
        <p id="finalScore">Score: 0</p>
        <button id="retryBtn" class="btn btn-primary">Try Again</button>
        <button id="menuBtn" class="btn btn-secondary">Menu</button>
      </div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls" class="hidden">
      <div class="mc-side mc-side-left">
        <button id="mcLeft"  class="mc-btn" aria-label="Left">&#9664;</button>
        <button id="mcRight" class="mc-btn" aria-label="Right">&#9654;</button>
      </div>
      <div class="mc-side mc-side-right">
        <button id="mcJump" class="mc-btn" aria-label="Jump">&#8679;</button>
        <button id="mcUp"  class="mc-btn" aria-label="Climb">&#9650;</button>
        <button id="mcAct" class="mc-btn mc-act" aria-label="Interact">E</button>
      </div>
    </div>

  </div>

  <script src="tilesheet.js"></script>
  <script src="spacegame-movement.js"></script>
  <script src="spacegame-events.js"></script>
  <script src="spacegame-renderer.js"></script>
  <script src="spacegame.js"></script>
</body>
</html>
