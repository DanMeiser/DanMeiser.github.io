<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Tile Sheet Inspector</title>
<style>
  body { margin:0; background:#111; color:#eee; font-family:monospace; display:flex; flex-direction:column; align-items:center; }
  h2   { margin:10px 0 4px; }
  #controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center; padding:6px; }
  label { font-size:13px; }
  input[type=number] { width:60px; padding:3px; background:#222; color:#fff; border:1px solid #555; }
  #info { background:#1a1a2e; padding:8px 16px; border-radius:6px; font-size:13px; min-width:300px; text-align:center; margin:4px 0; }
  #wrap { position:relative; cursor:crosshair; overflow:auto; max-width:98vw; }
  canvas { display:block; }
  #highlight { position:absolute; border:2px solid #ff0; pointer-events:none; box-sizing:border-box; }
</style>
</head>
<body>
<h2>Tile Sheet Inspector — platformPack_tilesheet.png</h2>
<div id="controls">
  <label>Tile W: <input id="tw" type="number" value="128" min="8" max="256"/></label>
  <label>Tile H: <input id="th" type="number" value="128" min="8" max="256"/></label>
  <label>Offset X: <input id="ox" type="number" value="0" min="0" max="64"/></label>
  <label>Offset Y: <input id="oy" type="number" value="0" min="0" max="64"/></label>
  <label>Scale: <input id="sc" type="number" value="0.5" min="0.1" max="2" step="0.05"/></label>
  <button onclick="draw()">Redraw</button>
</div>
<div id="info">Click a tile to see its sheet coordinates</div>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="highlight"></div>
</div>

<script>
const img = new Image();
img.src = 'assets/platformPack_tilesheet.png';
img.onload = draw;

function getVals() {
  return {
    tw: parseInt(document.getElementById('tw').value)||128,
    th: parseInt(document.getElementById('th').value)||128,
    ox: parseInt(document.getElementById('ox').value)||0,
    oy: parseInt(document.getElementById('oy').value)||0,
    sc: parseFloat(document.getElementById('sc').value)||0.5,
  };
}

function draw() {
  if (!img.complete || !img.naturalWidth) return;
  const {tw,th,ox,oy,sc} = getVals();
  const c = document.getElementById('c');
  c.width  = img.naturalWidth  * sc;
  c.height = img.naturalHeight * sc;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, c.width, c.height);

  // Grid overlay
  ctx.strokeStyle = 'rgba(255,255,0,0.35)';
  ctx.lineWidth = 1;
  const cols = Math.ceil((img.naturalWidth  - ox) / tw);
  const rows = Math.ceil((img.naturalHeight - oy) / th);
  for (let r = 0; r <= rows; r++) {
    const y = (oy + r * th) * sc;
    ctx.beginPath(); ctx.moveTo(ox*sc, y); ctx.lineTo(c.width, y); ctx.stroke();
  }
  for (let col = 0; col <= cols; col++) {
    const x = (ox + col * tw) * sc;
    ctx.beginPath(); ctx.moveTo(x, oy*sc); ctx.lineTo(x, c.height); ctx.stroke();
  }
}

document.getElementById('c').addEventListener('click', e => {
  const {tw,th,ox,oy,sc} = getVals();
  const rect = e.currentTarget.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / sc;
  const my = (e.clientY - rect.top)  / sc;
  const col = Math.floor((mx - ox) / tw);
  const row = Math.floor((my - oy) / th);
  const sx  = ox + col * tw;
  const sy  = oy + row * th;
  document.getElementById('info').innerHTML =
    `Col ${col}, Row ${row} &nbsp;|&nbsp; sx=${sx}, sy=${sy} &nbsp;|&nbsp; tile size ${tw}×${th}`;

  const hl = document.getElementById('highlight');
  const wrap = document.getElementById('wrap');
  const wRect = wrap.getBoundingClientRect();
  const cRect = document.getElementById('c').getBoundingClientRect();
  hl.style.left   = (cRect.left - wRect.left + wrap.scrollLeft + sx*sc) + 'px';
  hl.style.top    = (cRect.top  - wRect.top  + wrap.scrollTop  + sy*sc) + 'px';
  hl.style.width  = (tw * sc) + 'px';
  hl.style.height = (th * sc) + 'px';
});

['tw','th','ox','oy','sc'].forEach(id => document.getElementById(id).addEventListener('change', draw));
</script>
</body>
</html>
