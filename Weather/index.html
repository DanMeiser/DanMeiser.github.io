<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather — Meiser's Market</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', 'Segoe UI', Arial, sans-serif;
            background: #07071a;
            min-height: 100vh;
            color: #fff;
            padding: 2rem 1rem 3rem;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(77, 184, 212, 0.65);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: color 0.2s;
            margin-bottom: 2rem;
        }
        .back-link:hover { color: #4db8d4; }

        /* ── Loading / Error ── */
        .status {
            text-align: center;
            padding: 5rem 2rem;
            color: rgba(77, 184, 212, 0.6);
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(77, 184, 212, 0.2);
            border-top-color: #4db8d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status.error { color: rgba(231, 76, 60, 0.8); }
        .error-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

        /* ── Location header ── */
        .location {
            text-align: center;
            margin-bottom: 1.25rem;
            animation: fadeUp 0.5s ease-out both;
        }
        .city-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #a8d8f0 0%, #4db8d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(77, 184, 212, 0.4));
        }
        .region-name {
            font-size: 0.88rem;
            color: rgba(150, 200, 255, 0.5);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        /* ── Current weather card ── */
        .current-card {
            background: rgba(13, 59, 94, 0.3);
            border: 1px solid rgba(77, 184, 212, 0.18);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            margin-bottom: 0.85rem;
            animation: fadeUp 0.5s 0.05s ease-out both;
        }
        .current-icon { font-size: 4rem; line-height: 1; margin-bottom: 0.5rem; }
        .current-temp {
            font-size: clamp(4.5rem, 16vw, 6.5rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .current-unit { font-size: 0.4em; vertical-align: super; color: rgba(255,255,255,0.5); }
        .current-condition {
            font-size: 1.15rem;
            color: rgba(150, 210, 255, 0.8);
            letter-spacing: 0.05em;
            margin-top: 0.5rem;
        }

        /* ── Stat cards ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.65rem;
            margin-bottom: 1.25rem;
            animation: fadeUp 0.5s 0.1s ease-out both;
        }
        .stat-card {
            background: rgba(13, 59, 94, 0.22);
            border: 1px solid rgba(77, 184, 212, 0.13);
            border-radius: 14px;
            padding: 1rem 0.6rem;
            text-align: center;
        }
        .stat-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: #4db8d4; }
        .stat-label {
            font-size: 0.72rem;
            color: rgba(150, 200, 255, 0.45);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-top: 0.15rem;
        }

        /* ── AQI / Pollen ── */
        .aq-section {
            margin-top: 1.25rem;
            animation: fadeUp 0.5s 0.18s ease-out both;
        }
        .aq-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.65rem;
        }
        .aq-card {
            background: rgba(13, 59, 94, 0.22);
            border: 1px solid rgba(77, 184, 212, 0.13);
            border-radius: 14px;
            padding: 0.85rem 0.4rem;
            text-align: center;
        }
        .aq-icon  { font-size: 1.4rem; margin-bottom: 0.3rem; }
        .aq-value { font-size: 1.1rem; font-weight: 700; }
        .aq-label {
            font-size: 0.68rem;
            color: rgba(150, 200, 255, 0.45);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-top: 0.15rem;
        }
        .aq-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-radius: 6px;
            padding: 0.1rem 0.45rem;
            margin-top: 0.3rem;
        }

        /* ── Radar ── */
        .radar-section {
            margin-top: 1.4rem;
            animation: fadeUp 0.5s 0.25s ease-out both;
        }
        #radarMap {
            height: 340px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(77, 184, 212, 0.22);
            background: #0a1628;
        }
        .leaflet-container { background: #0a1628 !important; }
        .radar-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.6rem;
        }
        #radarPlay {
            background: rgba(13, 59, 94, 0.5);
            border: 1px solid rgba(77, 184, 212, 0.35);
            border-radius: 8px;
            color: #4db8d4;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.35rem 0.85rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        #radarPlay:hover { background: rgba(77, 184, 212, 0.18); border-color: #4db8d4; }
        #radarPlay:disabled { opacity: 0.4; cursor: default; }
        #radarTime {
            font-size: 0.78rem;
            color: rgba(150, 200, 255, 0.5);
            letter-spacing: 0.05em;
        }
        .radar-circle { stroke: #4db8d4 !important; fill: rgba(77,184,212,0.06) !important; }

        /* ── 7-day forecast ── */
        .forecast-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(150, 200, 255, 0.4);
            margin-bottom: 0.55rem;
            padding-left: 4px;
            animation: fadeUp 0.5s 0.15s ease-out both;
        }
        .forecast {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.45rem;
            animation: fadeUp 0.5s 0.2s ease-out both;
        }
        .day-card {
            background: rgba(13, 59, 94, 0.22);
            border: 1px solid rgba(77, 184, 212, 0.12);
            border-radius: 12px;
            padding: 0.6rem 0.25rem;
            text-align: center;
        }
        .day-card.today {
            background: rgba(13, 59, 94, 0.5);
            border-color: rgba(77, 184, 212, 0.45);
        }
        .day-name {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: rgba(150, 200, 255, 0.55);
            margin-bottom: 0.3rem;
        }
        .day-card.today .day-name { color: #4db8d4; }
        .day-icon { font-size: 1.2rem; margin-bottom: 0.25rem; }
        .day-hi { font-size: 0.85rem; font-weight: 700; }
        .day-lo { font-size: 0.75rem; color: rgba(150, 200, 255, 0.45); margin-top: 0.1rem; }

        .updated {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.75rem;
            color: rgba(150, 200, 255, 0.3);
            letter-spacing: 0.05em;
            animation: fadeUp 0.5s 0.25s ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #weather { display: none; }
    </style>
</head>
<body>
    <div class="page">
        <a href="../" class="back-link">&#8592; Meiser's Market</a>

        <div class="status" id="loading">
            <div class="spinner"></div>
            Locating you&hellip;
        </div>

        <div class="status error" id="errorState" style="display:none">
            <div class="error-icon">&#9888;&#65039;</div>
            <div id="errorMsg">Unable to load weather.</div>
        </div>

        <div id="weather">
            <div class="location">
                <div class="city-name" id="cityName"></div>
                <div class="region-name" id="regionName"></div>
            </div>

            <div class="current-card">
                <div class="current-icon" id="currentIcon"></div>
                <div class="current-temp" id="currentTemp"></div>
                <div class="current-condition" id="currentCondition"></div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-icon">&#127777;&#65039;</div>
                    <div class="stat-value" id="feelsLike"></div>
                    <div class="stat-label">Feels Like</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#128167;</div>
                    <div class="stat-value" id="humidity"></div>
                    <div class="stat-label">Humidity</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#128168;</div>
                    <div class="stat-value" id="wind"></div>
                    <div class="stat-label">Wind</div>
                </div>
            </div>

            <div class="forecast-label">7-Day Forecast</div>
            <div class="forecast" id="forecastRow"></div>

            <div class="aq-section" id="aqSection" style="display:none">
                <div class="forecast-label">Air Quality &amp; Allergies</div>
                <div class="aq-grid">
                    <div class="aq-card">
                        <div class="aq-icon">&#128165;</div>
                        <div class="aq-value" id="aqAqi"></div>
                        <div class="aq-label">US AQI</div>
                        <div class="aq-badge" id="aqAqiBadge"></div>
                    </div>
                    <div class="aq-card">
                        <div class="aq-icon">&#127807;</div>
                        <div class="aq-value" id="aqTree"></div>
                        <div class="aq-label">Tree Pollen</div>
                        <div class="aq-badge" id="aqTreeBadge"></div>
                    </div>
                    <div class="aq-card">
                        <div class="aq-icon">&#127808;</div>
                        <div class="aq-value" id="aqGrass"></div>
                        <div class="aq-label">Grass Pollen</div>
                        <div class="aq-badge" id="aqGrassBadge"></div>
                    </div>
                    <div class="aq-card">
                        <div class="aq-icon">&#127810;</div>
                        <div class="aq-value" id="aqWeed"></div>
                        <div class="aq-label">Weed Pollen</div>
                        <div class="aq-badge" id="aqWeedBadge"></div>
                    </div>
                </div>
            </div>

            <div class="updated" id="updated"></div>

            <div class="radar-section">
                <div class="forecast-label">Radar</div>
                <div id="radarMap"></div>
                <div class="radar-controls">
                    <button id="radarPlay" disabled>&#9654; Animate</button>
                    <span id="radarTime"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        const WMO = {
            0:  ['Clear Sky',            '☀️'],
            1:  ['Mainly Clear',         '🌤️'],
            2:  ['Partly Cloudy',        '⛅'],
            3:  ['Overcast',             '☁️'],
            45: ['Foggy',                '🌫️'],
            48: ['Icy Fog',              '🌫️'],
            51: ['Light Drizzle',        '🌦️'],
            53: ['Drizzle',              '🌦️'],
            55: ['Heavy Drizzle',        '🌧️'],
            61: ['Light Rain',           '🌧️'],
            63: ['Rain',                 '🌧️'],
            65: ['Heavy Rain',           '🌧️'],
            71: ['Light Snow',           '🌨️'],
            73: ['Snow',                 '❄️'],
            75: ['Heavy Snow',           '❄️'],
            77: ['Snow Grains',          '🌨️'],
            80: ['Light Showers',        '🌦️'],
            81: ['Showers',              '🌧️'],
            82: ['Heavy Showers',        '⛈️'],
            85: ['Snow Showers',         '🌨️'],
            86: ['Heavy Snow Showers',   '❄️'],
            95: ['Thunderstorm',         '⛈️'],
            96: ['Thunderstorm w/ Hail', '⛈️'],
            99: ['Thunderstorm w/ Hail', '⛈️'],
        };

        function wmo(code) { return WMO[code] || ['Unknown', '🌡️']; }

        function showError(msg) {
            document.getElementById('loading').style.display    = 'none';
            document.getElementById('errorMsg').textContent     = msg;
            document.getElementById('errorState').style.display = 'block';
        }

        async function getGeo() {
            const errors = [];

            // 1. ipapi.co — works on localhost, free, no key
            try {
                const r = await fetch('https://ipapi.co/json/');
                if (r.ok) {
                    const d = await r.json();
                    if (d.city && d.latitude) {
                        return { city: d.city, region: d.region, country_code: d.country_code,
                                 latitude: d.latitude, longitude: d.longitude, tzId: d.timezone || 'auto' };
                    }
                    errors.push('ipapi.co: ' + (d.reason || 'bad response'));
                }
            } catch (e) { errors.push('ipapi.co: ' + e.message); }

            // 2. ipinfo.io — works on localhost, free, no key for basic fields
            try {
                const r = await fetch('https://ipinfo.io/json');
                if (r.ok) {
                    const d = await r.json();
                    if (d.city && d.loc) {
                        const [lat, lon] = d.loc.split(',').map(Number);
                        const region = d.region || d.country || '';
                        return { city: d.city, region, country_code: d.country || '',
                                 latitude: lat, longitude: lon, tzId: d.timezone || 'auto' };
                    }
                    errors.push('ipinfo.io: bad response');
                }
            } catch (e) { errors.push('ipinfo.io: ' + e.message); }

            // 3. ip-api.com — may be blocked on localhost but worth trying last
            try {
                const r = await fetch('http://ip-api.com/json/?fields=status,city,regionName,countryCode,lat,lon,timezone');
                if (r.ok) {
                    const d = await r.json();
                    if (d.status === 'success') {
                        return { city: d.city, region: d.regionName, country_code: d.countryCode,
                                 latitude: d.lat, longitude: d.lon, tzId: d.timezone };
                    }
                    errors.push('ip-api.com: ' + d.message);
                }
            } catch (e) { errors.push('ip-api.com: ' + e.message); }

            throw new Error('Location failed: ' + errors.join(' | '));
        }

        async function loadWeather() {
            try {
                // Step 1: IP-based geolocation (no key, no permission prompt)
                const { city, region, country_code, latitude, longitude, tzId } = await getGeo();

                // Step 2: Weather + Air Quality fetched in parallel
                const wxUrl = 'https://api.open-meteo.com/v1/forecast'
                    + '?latitude='  + latitude
                    + '&longitude=' + longitude
                    + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m'
                    + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
                    + '&temperature_unit=fahrenheit'
                    + '&wind_speed_unit=mph'
                    + '&timezone=' + encodeURIComponent(tzId)
                    + '&forecast_days=7';

                const aqUrl = 'https://air-quality-api.open-meteo.com/v1/air-quality'
                    + '?latitude='  + latitude
                    + '&longitude=' + longitude
                    + '&current=us_aqi,pm10,pm2_5'
                    + '&timezone=' + encodeURIComponent(tzId);

                const pollenUrl = 'https://air-quality-api.open-meteo.com/v1/air-quality'
                    + '?latitude='  + latitude
                    + '&longitude=' + longitude
                    + '&hourly=birch_pollen,grass_pollen,ragweed_pollen'
                    + '&timezone=' + encodeURIComponent(tzId)
                    + '&forecast_days=1';

                const [wxRes, aqRes, pollenRes] = await Promise.all([fetch(wxUrl), fetch(aqUrl), fetch(pollenUrl)]);
                if (!wxRes.ok) throw new Error('Weather service unavailable');
                const wx     = await wxRes.json();
                const aq     = aqRes.ok     ? await aqRes.json()     : null;
                const pollen = pollenRes.ok ? await pollenRes.json() : null;

                renderWithRadar(city, region, country_code, wx, latitude, longitude);
                renderAQ(aq, pollen);
            } catch (e) {
                showError(e.message || 'Unable to load weather data.');
            }
        }

        function aqiLabel(v) {
            if (v <= 50)  return ['Good',             '#22c55e'];
            if (v <= 100) return ['Moderate',         '#eab308'];
            if (v <= 150) return ['Unhealthy (sens)', '#f97316'];
            if (v <= 200) return ['Unhealthy',        '#ef4444'];
            if (v <= 300) return ['Very Unhealthy',   '#a855f7'];
            return               ['Hazardous',        '#be123c'];
        }
        function pollenLabel(v) {
            if (v == null || isNaN(v)) return ['–',         'rgba(150,200,255,0.3)'];
            if (v < 10)  return ['Low',       '#22c55e'];
            if (v < 50)  return ['Moderate',  '#eab308'];
            if (v < 200) return ['High',      '#f97316'];
            return               ['Very High', '#ef4444'];
        }
        function setBadge(id, label, color) {
            const el = document.getElementById(id);
            el.textContent = label;
            el.style.background = color + '22';
            el.style.color = color;
        }
        function renderAQ(aq, pollen) {
            const NA = 'N/A';
            const dimColor = 'rgba(150,200,255,0.3)';

            const aqi = aq?.current?.us_aqi;
            if (aqi != null) {
                document.getElementById('aqAqi').textContent = aqi;
                const [lbl, col] = aqiLabel(aqi);
                setBadge('aqAqiBadge', lbl, col);
                document.getElementById('aqAqi').style.color = col;
            } else {
                document.getElementById('aqAqi').textContent = NA;
                document.getElementById('aqAqi').style.color = dimColor;
                setBadge('aqAqiBadge', 'Unavailable', dimColor);
            }

            // Use the first available hourly pollen value (current hour)
            const now = new Date();
            const hourIdx = now.getHours();
            function pollenVal(arr) {
                if (!arr || !arr.length) return null;
                const v = arr[Math.min(hourIdx, arr.length - 1)];
                return (v == null || isNaN(v)) ? null : v;
            }
            const tree  = pollenVal(pollen?.hourly?.birch_pollen);
            const grass = pollenVal(pollen?.hourly?.grass_pollen);
            const weed  = pollenVal(pollen?.hourly?.ragweed_pollen);

            const fmt = v => (v == null) ? NA : Math.round(v);

            document.getElementById('aqTree').textContent  = fmt(tree);
            document.getElementById('aqGrass').textContent = fmt(grass);
            document.getElementById('aqWeed').textContent  = fmt(weed);

            [[tree, 'aqTreeBadge'], [grass, 'aqGrassBadge'], [weed, 'aqWeedBadge']].forEach(([v, id]) => {
                if (v == null) setBadge(id, 'Unavailable', dimColor);
                else { const [lbl, col] = pollenLabel(v); setBadge(id, lbl, col); }
            });

            [['aqTree', tree], ['aqGrass', grass], ['aqWeed', weed]].forEach(([id, v]) => {
                document.getElementById(id).style.color = v == null ? dimColor : '#fff';
            });

            document.getElementById('aqSection').style.display = 'block';
        }

        // ── Radar ──────────────────────────────────────────────────────────────
        let radarMap = null;
        let radarLayers = [];
        let radarFrameIdx = 0;
        let radarPlaying = false;
        let radarTimer = null;

        async function initRadar(lat, lon) {
            if (radarMap) return;

            radarMap = L.map('radarMap', { zoomControl: true, attributionControl: true })
                        .setView([lat, lon], 7);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 18,
            }).addTo(radarMap);

            // 100-mile radius circle (1 mile ≈ 1609.34 m)
            L.circle([lat, lon], {
                radius: 160934,
                className: 'radar-circle',
                weight: 1.5,
                dashArray: '6 4',
            }).addTo(radarMap);

            // Fetch RainViewer frame list
            try {
                const rv = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await rv.json();
                const host           = data.host || 'https://tilecache.rainviewer.com';
                const pastFrames     = (data.radar && data.radar.past)    ? data.radar.past    : [];
                const nowcastFrames  = (data.radar && data.radar.nowcast) ? data.radar.nowcast : [];
                if (!pastFrames.length) return;

                // Merge past + nowcast into one sequence; tag each with its type
                const allFrames = [
                    ...pastFrames.map(f => ({ ...f, isForecast: false })),
                    ...nowcastFrames.map(f => ({ ...f, isForecast: true })),
                ];
                const pastCount = pastFrames.length;

                // Create a Leaflet tile layer for each frame (but don't add yet)
                radarLayers = allFrames.map(frame => {
                    const layer = L.tileLayer(host + frame.path +
                        '/256/{z}/{x}/{y}/2/1_1.png', {
                        opacity: frame.isForecast ? 0.45 : 0.6,
                        zIndex: 10,
                    });
                    layer.on('tileerror', e => { e.tile.style.display = 'none'; });
                    return layer;
                });

                if (!nowcastFrames.length) {
                    document.getElementById('radarTime').textContent = 'Forecast unavailable for this area';
                }

                // Show the latest *past* frame immediately
                radarFrameIdx = pastCount - 1;
                radarLayers[radarFrameIdx].addTo(radarMap);
                updateRadarTime(allFrames, radarFrameIdx);

                const playBtn = document.getElementById('radarPlay');
                playBtn.disabled = false;
                playBtn.addEventListener('click', () => {
                    if (radarPlaying) {
                        radarPlaying = false;
                        clearInterval(radarTimer);
                        playBtn.textContent = '\u25B6 Animate';
                    } else {
                        radarPlaying = true;
                        playBtn.textContent = '\u23F8 Stop';
                        radarTimer = setInterval(() => {
                            radarLayers[radarFrameIdx].removeFrom(radarMap);
                            radarFrameIdx = (radarFrameIdx + 1) % radarLayers.length;
                            radarLayers[radarFrameIdx].addTo(radarMap);
                            updateRadarTime(allFrames, radarFrameIdx);
                        }, 250);
                    }
                });

                function updateRadarTime(frames, idx) {
                    const frame = frames[idx];
                    const ts = new Date(frame.time * 1000);
                    const timeStr = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        + ' · ' + ts.toLocaleDateString([], { month: 'short', day: 'numeric' });
                    document.getElementById('radarTime').textContent =
                        frame.isForecast ? '\u23F3 Forecast: ' + timeStr : timeStr;
                }

            } catch (e) {
                document.getElementById('radarTime').textContent = 'Radar unavailable';
            }
        }
        // ───────────────────────────────────────────────────────────────────────

        function render(city, region, countryCode, wx) {
            const c = wx.current;
            const d = wx.daily;
            const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const [condLabel, condIcon] = wmo(c.weather_code);

            document.getElementById('cityName').textContent = city;
            document.getElementById('regionName').textContent = region + ' \u00B7 ' + countryCode;
            document.getElementById('currentIcon').textContent = condIcon;
            document.getElementById('currentTemp').innerHTML =
                Math.round(c.temperature_2m) + '<span class="current-unit">\u00B0F</span>';
            document.getElementById('currentCondition').textContent = condLabel;
            document.getElementById('feelsLike').textContent = Math.round(c.apparent_temperature) + '\u00B0';
            document.getElementById('humidity').textContent  = c.relative_humidity_2m + '%';
            document.getElementById('wind').textContent      = Math.round(c.wind_speed_10m) + ' mph';

            document.getElementById('forecastRow').innerHTML = d.time.map((dateStr, i) => {
                const dayIdx = new Date(dateStr + 'T12:00:00').getDay();
                const [, icon] = wmo(d.weather_code[i]);
                const isToday = i === 0;
                return '<div class="day-card' + (isToday ? ' today' : '') + '">'
                    + '<div class="day-name">' + (isToday ? 'Today' : DAYS[dayIdx]) + '</div>'
                    + '<div class="day-icon">' + icon + '</div>'
                    + '<div class="day-hi">' + Math.round(d.temperature_2m_max[i]) + '\u00B0</div>'
                    + '<div class="day-lo">' + Math.round(d.temperature_2m_min[i]) + '\u00B0</div>'
                    + '</div>';
            }).join('');

            const now = new Date();
            document.getElementById('updated').textContent =
                'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('weather').style.display = 'block';
        }

        function renderWithRadar(city, region, countryCode, wx, lat, lon) {
            render(city, region, countryCode, wx);
            // Defer map init slightly so the container is visible
            setTimeout(() => initRadar(lat, lon), 100);
        }

        loadWeather();
    </script>
</body>
</html>
